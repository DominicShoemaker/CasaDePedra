<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cancellation Policy</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 40px; }
        h1 { color: #003f64; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        ul { padding-left: 20px; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Cancellation Policy</h1>
    <ul>
        <li><strong>Full Refund (Minus 3% Stripe Fees):</strong> If cancelled at least 30 days before check-in.</li>
        <li><strong>50% Refund:</strong> If cancelled between 7 and 14 days before check-in.</li>
        <li><strong>No Refund:</strong> If cancelled less than 7 days before check-in.</li>
    </ul>
</body>
</html>
