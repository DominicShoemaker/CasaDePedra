<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casa de Pedra - Luxury rental in Copacabana - Rio de Janeiro</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Historic 4-bedroom luxury villa in Copacabana, Rio de Janeiro. Steps from the beach. Features a hot tub, dedicated workspace, and accommodates up to 10 guests.">
    <meta property="og:title" content="Luxury Rental in Copacabana - Casa de Pedra">
    <meta property="og:description"
        content="Historic 4-bedroom luxury villa. Steps away from the beach, featuring a hot tub, BBQ, and workspace. Sleeps 10.">
    <meta property="og:image" content="https://casadepedra.rio/images/collage house wide.png">
    <meta property="og:url" content="https://casadepedra.rio">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Styles and Scripts -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="rio-chic">

    <!-- HERO SECTION -->
    <header class="hero">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1>Luxury rental in Copacabana</h1>
                <h1>Rio • Brazil</h1>
                <p>Historic 4BR/4.5BA Villa • Steps from the Beach • Hot Tub • Sleeps 10</p>
            </div>
        </div>
    </header>

    <main class="container section confirmation-container" id="content-container">
        <h2>Booking Incomplete</h2>
        <p class="confirmation-message" style="color: var(--text-main);">
            It looks like you didn't finish your booking. Would you like to continue?
        </p>

        <div class="details-box" id="booking-details" style="display:none;"></div>

        <div class="confirmation-actions">
            <button id="btn-continue" class="btn-primary">Continue</button>
            <button id="btn-cancel" class="btn-outline">Cancel Booking</button>
        </div>
    </main>

    <!---------------------- FOOTER ---------------------->
    <footer>
        <p>© 2026 Casa de Pedra, Copacabana — All Rights Reserved</p>
    </footer>

    <script>
        async function cancelBooking(reservationID, fromDate, toDate) {
            if (reservationID && fromDate && toDate) {
                try {
                    const url = `https://shorttermreservation.azurewebsites.net/api/Reservation/${reservationID}/${fromDate}/${toDate}`;
                    await fetch(url, { method: 'DELETE' });
                } catch (e) {
                    console.error('Error deleting reservation:', e);
                }
            }
            localStorage.removeItem('booking_pending');
        }

        window.addEventListener('popstate', () => {
            const pendingDataStr = localStorage.getItem('booking_pending');
            if (pendingDataStr) {
                try {
                    const d = JSON.parse(pendingDataStr);
                    cancelBooking(d.reservationID, d.from, d.to);
                } catch (e) {
                    localStorage.removeItem('booking_pending');
                }
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            let paymentUrl = '';
            let reservationID = '';
            let fromDate = '';
            let toDate = '';
            let fullName = '';
            let email = '';
            let phone = '';
            let price = '';

            const pendingDataStr = localStorage.getItem('booking_pending');
            if (pendingDataStr) {
                try {
                    const pendingData = JSON.parse(pendingDataStr);
                    paymentUrl = pendingData.paymentUrl;
                    reservationID = pendingData.reservationID;
                    fromDate = pendingData.from;
                    toDate = pendingData.to;
                    fullName = pendingData.fullName || '';
                    email = pendingData.email || '';
                    phone = pendingData.phone || '';
                    price = pendingData.price || '';
                } catch (e) {
                    console.error('Error parsing booking data:', e);
                }
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                reservationID = urlParams.get('reservationid') || '';
                fromDate = urlParams.get('from') || '';
                toDate = urlParams.get('to') || '';
                fullName = urlParams.get('name') || '';
                email = urlParams.get('email') || '';
                phone = urlParams.get('phone') || '';
                price = urlParams.get('price') || '';
            }

            // Calculate nights
            let nightsCount = 'N/A';
            if (fromDate && toDate) {
                const start = new Date(fromDate);
                const end = new Date(toDate);
                if (!isNaN(start) && !isNaN(end)) {
                    nightsCount = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24));
                }
            }

            // Populate details box
            const detailsBox = document.getElementById('booking-details');
            let html = '';
            if (fullName) html += `<p><span>Name:</span> <strong>${fullName}</strong></p>`;
            if (email) html += `<p><span>Email:</span> <strong>${email}</strong></p>`;
            if (phone) html += `<p><span>Phone:</span> <strong>${phone}</strong></p>`;
            const formatDisplayDate = (dateStr) => {
                const d = new Date(dateStr + 'T00:00:00');
                return isNaN(d) ? dateStr : d.toLocaleDateString();
            };

            if (reservationID) html += `<p><span>Reservation ID:</span> <strong>${reservationID}</strong></p>`;
            if (fromDate) html += `<p><span>Check-in:</span> <strong>${formatDisplayDate(fromDate)}</strong></p>`;
            if (toDate) html += `<p><span>Check-out:</span> <strong>${formatDisplayDate(toDate)}</strong></p>`;
            html += `<p><span>Total Nights:</span> <strong>${nightsCount}</strong></p>`;
            if (price) html += `<p><span>Price:</span> <strong>$${price}</strong></p>`;
            if (html) {
                detailsBox.innerHTML = html;
                detailsBox.style.display = 'block';
            }

            document.getElementById('btn-continue').addEventListener('click', () => {
                if (paymentUrl) {
                    window.location.href = paymentUrl;
                } else {
                    window.location.href = 'index.html';
                }
            });

            document.getElementById('btn-cancel').addEventListener('click', async () => {
                const btn = document.getElementById('btn-cancel');
                btn.disabled = true;
                btn.textContent = 'Canceling...';

                await cancelBooking(reservationID, fromDate, toDate);
                window.location.href = 'index.html';
            });
        });
    </script>
</body>

</html>
