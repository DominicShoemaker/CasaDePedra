<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservation Confirmation - Luxury rental in Copacabana - Rio de Janeiro</title>
    
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!---------------------- HEADER ---------------------->
    <header>
        <h1>Luxury rental in Copacabana • Rio • Brazil</h1>
        <p>Historic 4BR/4.5BA Villa — Steps away from the beach • Hot Tub • Workspace • Sleeps 10</p>
    </header>

    <!---------------------- NAVIGATION ---------------------->
    <nav>
        <a href="index.html">Back to Home Screen</a>
    </nav>

    <main class="container section" id="content-container" style="max-width: 800px; text-align: center;">
        <!-- Content will be injected by JavaScript -->
        <p>Loading your reservation details...</p>
    </main>

    <!---------------------- FOOTER ---------------------->
    <footer>
        <p>© 2026 Casa de Pedra, Copacabana — All Rights Reserved</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            localStorage.removeItem('booking_pending');
            const container = document.getElementById('content-container');
            const urlParams = new URLSearchParams(window.location.search);

            // Check status: 'success' or 'failed' (default to failed if missing parameters for security)
            const status = urlParams.get('status');

            if (status === 'success') {
                const reservationID = urlParams.get('reservationid') || 'N/A';
                const fromDate = urlParams.get('from') || 'N/A';
                const toDate = urlParams.get('to') || 'N/A';
                const amount = urlParams.get('amount') || '0.00';

                // Calculate nights if both dates are valid
                let nightsCount = 'N/A';
                if (fromDate !== 'N/A' && toDate !== 'N/A') {
                    const start = new Date(fromDate);
                    const end = new Date(toDate);
                    if (!isNaN(start) && !isNaN(end)) {
                        const diffTime = Math.abs(end - start);
                        nightsCount = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    }
                }

                container.innerHTML = `
                    <h2>🎉 Reservation Confirmed!</h2>
                    <p style="font-size: 18px; color: #555;">Thank you for booking with us. We look forward to hosting you at Casa de Pedra.</p>
                    
                    <div class="details-box">
                        <p><span>Reservation ID:</span> <strong>${reservationID}</strong></p>
                        <p><span>Check-in:</span> <strong>${fromDate}</strong></p>
                        <p><span>Check-out:</span> <strong>${toDate}</strong></p>
                        <p><span>Total Nights:</span> <strong>${nightsCount}</strong></p>
                        <p><span>Total Paid:</span> <strong>$${amount}</strong></p>
                    </div>

                    <div>
                        <button class="action-btn" onclick="window.print()">Print Details</button>
                        <a href="/" class="action-btn secondary">Return to Homepage</a>
                    </div>
                `;
            } else {
                // Failed state or fallback
                container.innerHTML = `
                    <h2 style="color: var(--error-color);">Reservation Incomplete</h2>
                    <p class="error-message" style="color: var(--error-color); font-size: 20px; margin-bottom: 20px;">We're sorry, but your reservation did not go through or the payment was unsuccessful.</p>
                    <p style="font-size: 18px; color: #333; margin-bottom: 30px;">
                        Please try booking again later. If the issue persists, we can process your reservation manually.<br><br>
                        <strong>Contact Support:</strong><br>
                        Email: <a href="mailto:support@casadepedra.rio" style="color: var(--accent-color);">support@casadepedra.rio</a><br>
                        Phone/WhatsApp: <strong>+1 (669) 268-7875</strong>
                    </p>
                    
                    <div>
                        <a href="index.html" class="action-btn">Return to Homepage</a>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
